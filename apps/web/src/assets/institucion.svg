<?xml version="1.0" encoding="UTF-8"?>
<!--
  Imagen de marca de la institución (PLACEHOLDER).
  En producción (multi-tenant) se reemplaza por la imagen/branding propio de cada colegio.
-->
<svg width="900" height="1200" viewBox="0 0 900 1200" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="1200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="0.55" stop-color="#6d28d9"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="1200" fill="url(#bg)"/>
  <rect width="900" height="1200" fill="url(#glow)"/>

  <!-- Círculos decorativos -->
  <circle cx="730" cy="220" r="160" fill="#ffffff" opacity="0.06"/>
  <circle cx="150" cy="980" r="220" fill="#ffffff" opacity="0.05"/>
  <circle cx="120" cy="180" r="60" fill="#ffffff" opacity="0.07"/>

  <!-- Birrete de graduación -->
  <g transform="translate(450 470)" fill="#ffffff">
    <polygon points="0,-70 180,0 0,70 -180,0" opacity="0.95"/>
    <path d="M -110 28 L -110 95 Q 0 165 110 95 L 110 28 L 0 78 Z" opacity="0.85"/>
    <rect x="176" y="-2" width="8" height="120" rx="4" opacity="0.9"/>
    <circle cx="180" cy="128" r="16" opacity="0.9"/>
  </g>

  <!-- Texto -->
  <text x="450" y="730" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="78" font-weight="700" fill="#ffffff" letter-spacing="2">Skoolar</text>
  <text x="450" y="790" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="30" font-weight="400" fill="#ffffff" opacity="0.8">Plataforma de gestión escolar</text>

  <!-- Línea decorativa -->
  <rect x="370" y="828" width="160" height="4" rx="2" fill="#ffffff" opacity="0.6"/>
</svg>
